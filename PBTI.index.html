let currentQuestion = 0;

const scores = {
power:0,
control:0,
resource:0,
risk:0
};

function startTest(){

document.getElementById("home").classList.add("hidden");
document.getElementById("test").classList.remove("hidden");

renderQuestion();

}

function renderQuestion(){

const q = questions[currentQuestion];

document.getElementById("progressText").innerText =
`问题 ${currentQuestion+1} / ${questions.length}`;

document.getElementById("progressBar").style.width =
`${((currentQuestion+1)/questions.length)*100}%`;

document.getElementById("question").innerText =
q.question;

document.getElementById("optionA").innerText =
"A. " + q.a;

document.getElementById("optionB").innerText =
"B. " + q.b;

document.getElementById("optionA").onclick =
()=>answer(q.dimension,false);

document.getElementById("optionB").onclick =
()=>answer(q.dimension,true);

}

function answer(dimension,isB){

if(isB){
scores[dimension]++;
}

currentQuestion++;

if(currentQuestion < questions.length){

renderQuestion();

}else{

showLoading();

}

}

function showLoading(){

document.getElementById("test").classList.add("hidden");
document.getElementById("loading").classList.remove("hidden");

const texts = [
"构建人格模型...",
"分析权力结构...",
"计算联盟倾向...",
"评估风险偏好...",
"匹配最终人格..."
];

let i=0;

const timer = setInterval(()=>{

document.getElementById("loadingText").innerText =
texts[i];

i++;

if(i>=texts.length){

clearInterval(timer);

setTimeout(showResult,500);

}

},600);

}
function showResult(){

document.getElementById("loading").classList.add("hidden");
document.getElementById("result").classList.remove("hidden");

const power =
scores.power >= 2 ? "C" : "A";

const control =
scores.control >= 2 ? "H" : "S";

const resource =
scores.resource >= 2 ? "K" : "D";

const risk =
scores.risk >= 2 ? "P" : "R";

const code =
power +
control +
resource +
risk;

const type = types[code];

document.getElementById("typeCode").innerText =
code;

document.getElementById("typeName").innerText =
type.name;

document.getElementById("typeTitle").innerText =
type.title;

document.getElementById("description").innerText =
type.desc;

document.getElementById("motivation").innerText =
type.motivation;

document.getElementById("fear").innerText =
type.fear;

document.getElementById("examples").innerHTML =
type.examples.map(item =>
`<li class="mb-2">• ${item}</li>`
).join("");

document.getElementById("typeImage").src =
`Image/${code}.pic.png`;

document.getElementById("typeImage").alt =
`${type.name} 图像`;

drawRadar();

}

function drawRadar(){

const canvas =
document.getElementById("radar");

new Chart(canvas,{

type:"radar",

data:{

labels:[
"联盟倾向",
"强硬控制",
"资源掌控",
"风险偏好"
],

datasets:[{

label:"PBTI",

data:[

scores.power * 25,

scores.control * 25,

scores.resource * 25,

scores.risk * 25

],

fill:true,

backgroundColor:
"rgba(212,175,55,.25)",

borderColor:
"#d4af37",

pointBackgroundColor:
"#d4af37",

pointBorderColor:
"#d4af37",

pointRadius:4

}]

},

options:{

responsive:true,

plugins:{

legend:{
display:false
}

},

scales:{

r:{

min:0,

max:100,

ticks:{
display:false
},

grid:{
color:"rgba(255,255,255,.08)"
},

angleLines:{
color:"rgba(255,255,255,.08)"
},

pointLabels:{
color:"#ffffff",
font:{
size:14
}
}

}

}

}

});

}
</script>
